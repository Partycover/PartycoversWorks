<script>
  function changeImage(direction, tag, minImage, maxImage) {
    const imgElement = document.getElementById(tag);
    const currentSrc = imgElement.getAttribute('src');
    
    const match = currentSrc.match(/(\d+)\.webp/);
    
    let currentImageNum = match ? parseInt(match[1], 10) : minImage;

    currentImageNum += direction;

    if (currentImageNum < minImage) {
      currentImageNum = minImage;
    } else if (currentImageNum > maxImage) {
      currentImageNum = maxImage;
    }

    imgElement.src = tag + currentImageNum + '.webp';
  }
</script>
