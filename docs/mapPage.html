<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Partycover's Works</title>
<style>
body {
  font-family: Georgia, "Times New Roman", serif; /* best font tbh*/
  margin: 0; 
  padding: 20px;
  color: #222;
  line-height: 1.5;
  box-sizing: border-box;
}
h1 { margin-bottom: 4px; }
.tagline { color: #555; font-style: italic; margin-top: 0; }
a { color: #1a5276; }

.split-layout {
  display: flex;
  flex-direction: row;
  width: 100%;
  max-width: 1400px;
  margin: 40px auto; 
  gap: 40px; 
}

.half-pane {
  flex: 1; 
  display: flex;
  flex-direction: column;
  align-items: center; 
  justify-content: center; 
}

.map-container {
  position: relative;     
  display: inline-block;  
  cursor: none;           
}

.map-container .base-map {
  display: block;
  max-width: 100%;
  height: auto;
}

#custom-cursor {
  position: absolute;
  pointer-events: none; 
  transform: translate(-50%, -50%); 
  display: none; 
  z-index: 10;
}

.map-labels {
  margin-top: 20px;
  text-align: center;
}
.map-labels p {
  margin: 4px 0;
  min-height: 24px; 
  font-weight: bold;
}

.mini-page-frame {
  width: 100%;
  max-width: 600px;
  height: 600px; 
  border: 2px solid #ccc;
  border-radius: 8px; 
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

    </div>

    <div class="map-labels">

      <p id="clickLabel"></p>
    </div>
  </div>

  let currentHoveredName = "";

  //U[dates cursor position and check for locations
  wrapper.addEventListener('mousemove', (e) => {
    const rect = wrapper.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    cursor.style.left = `${x}px`; 
    cursor.style.top = `${y}px`;

    currentHoveredName = "";
    
    //Check if the mouse (x,y) falls within the 16x16 of any location
    for (const loc of mapLocations) {
      if (x >= loc.x && x <= loc.x + 16 && y >= loc.y && y <= loc.y + 16) {
        currentHoveredName = loc.name;
        break; 
      }
    }

    hoverLabel.innerText = currentHoveredName;
  });

  //Click copies to second label AND updatess the iframe sourcew
  wrapper.addEventListener('click', () => {
    if (currentHoveredName !== "") {
      clickLabel.innerText = currentHoveredName;
      
      // Update the iframe to load the corresponding HTML page
      iframeElement.src = currentHoveredName + ".html";
    }
  });

  //Show/Hide cursor logic
  wrapper.addEventListener('mouseenter', () => {
    cursor.style.display = 'block';
  });

  wrapper.addEventListener('mouseleave', () => {
    cursor.style.display = 'none';
    hoverLabel.innerText = ""; 
    currentHoveredName = "";
  });
</script>
